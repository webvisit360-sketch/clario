name: Deploy Supabase — Production

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - '.github/workflows/supabase-production.yml'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "production" to confirm manual deploy'
        required: true

jobs:
  deploy:
    name: Push migrations to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate manual trigger confirmation
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "production" ]; then
            echo "❌ Confirmation input must be 'production'. Got: ${{ github.event.inputs.confirm }}"
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "${{ secrets.PROD_SUPABASE_PROJECT_ID }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push database migrations
        run: supabase db push --password "${{ secrets.PROD_SUPABASE_DB_PASSWORD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Notify success
        if: success()
        run: echo "✅ Production Supabase migrations deployed successfully."

      - name: Notify failure
        if: failure()
        run: echo "❌ Production deployment failed. Check logs above."

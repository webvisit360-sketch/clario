name: Deploy Supabase — Staging

on:
  push:
    branches:
      - staging
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - '.github/workflows/supabase-staging.yml'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "staging" to confirm manual deploy'
        required: true

jobs:
  deploy:
    name: Push migrations to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate manual trigger confirmation
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "staging" ]; then
            echo "❌ Confirmation input must be 'staging'. Got: ${{ github.event.inputs.confirm }}"
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push database migrations
        run: |
          supabase db push \
            --project-ref "${{ secrets.STAGING_SUPABASE_PROJECT_ID }}" \
            --password "${{ secrets.STAGING_SUPABASE_DB_PASSWORD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Notify success
        if: success()
        run: echo "✅ Staging Supabase migrations deployed successfully."

      - name: Notify failure
        if: failure()
        run: echo "❌ Staging deployment failed. Check logs above."
